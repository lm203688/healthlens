name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_NAME: healthlens
  REGISTRY: # e.g., swr.cn-north-4.myhuaweicloud.com/your-namespace

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/healthlens
            git pull origin main
            export IMAGE_TAG=${{ steps.tag.outputs.TAG }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull web worker
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null; then
                echo "Health check passed after ${i} attempts"
                docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T web alembic upgrade head
                echo "Deployment complete: ${{ steps.tag.outputs.TAG }}"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after 60s, rolling back..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            exit 1