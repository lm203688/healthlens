# ============================================================
# HealthLens Nginx Configuration
# - Rate limiting, security headers, HTTPS termination
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # --- Rate Limiting ---
    # 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_status 429;

    # --- Upstream ---
    upstream web_backend {
        server web:8000;
        keepalive 32;
    }

    # ============================================================
    # HTTP -> HTTPS redirect
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS Server
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # --- SSL Configuration ---
        # Uncomment and set paths when SSL certificates are available:
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        # Fallback: serve HTTP directly if no SSL certs (dev/staging)
        # Remove this and enable ssl_certificate above for production
        listen 80;
        server_name _;

        # --- Security Headers ---
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --- Upload Size Limit (medical reports, tongue images) ---
        client_max_body_size 50M;

        # --- Timeouts ---
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # --- Locations ---
        location / {
            limit_req burst=20 nodelay;
            proxy_pass http://web_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Health check (no rate limit, no logging)
        location /health {
            limit_req off;
            access_log off;
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
        }

        # Prometheus metrics (restrict access)
        location /metrics {
            limit_req off;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
        }
    }
}
