# ============================================================
# HealthLens Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  web:
    ports: []                       # No direct exposure; traffic via Nginx
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  worker:
    healthcheck:
      test: ["CMD", "celery", "-A", "app.worker.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  db:
    ports: []
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    ports: []
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-change_me_redis_password}

  minio:
    ports: []

  # ----------------------------------------------------------
  # Nginx Reverse Proxy (HTTPS termination, rate limiting)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: healthlens-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - healthlens-net

volumes:
  nginx-logs:
    driver: local
